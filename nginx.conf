# 溪花博客 Nginx 配置
# 适用场景：Hexo 静态博客 + Spring Boot API + Vue 管理后台

server {
    listen 80;
    server_name localhost;  # 部署时改为实际域名

    # 字符集
    charset utf-8;

    # 日志
    access_log logs/xihua-blog-access.log;
    error_log  logs/xihua-blog-error.log;

    # =======================================
    # 1. Hexo 静态博客（前端展示）
    # =======================================
    location / {
        root D:/xihua-blog/public;
        index index.html;
        try_files $uri $uri/ =404;

        # 静态资源缓存（1 天）
        expires 1d;
        add_header Cache-Control "public, no-transform";

        # 安全响应头
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # 部署 HTTPS 后移除下面注释启用 HSTS
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    # =======================================
    # 2. Spring Boot API 反向代理
    # =======================================
    location /api/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（如果需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;

        # 安全响应头
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # 部署 HTTPS 后移除下面注释启用 HSTS
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    # =======================================
    # 3. Vue 3 管理后台 SPA
    # =======================================
    location /admin/ {
        alias D:/xihua-blog/admin/dist/;
        index index.html;

        # SPA 路由：所有 /admin/* 请求指向 index.html
        try_files $uri $uri/ /admin/index.html;

        # 静态资源缓存
        expires 1d;
        add_header Cache-Control "public, no-transform";

        # 安全响应头
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # 部署 HTTPS 后移除下面注释启用 HSTS
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    # =======================================
    # 4. 安全相关
    # =======================================
    # 隐藏 Nginx 版本号
    server_tokens off;

    # 限制请求体大小（评论提交等）
    client_max_body_size 10m;
}
