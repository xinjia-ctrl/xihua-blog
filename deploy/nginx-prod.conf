# 溪花博客 Nginx 生产配置
# 适用环境：Ubuntu 22.04 + Docker MySQL + IP 部署

limit_req_zone $binary_remote_addr zone=xihua_api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=xihua_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=xihua_comment:10m rate=6r/m;
limit_conn_zone $binary_remote_addr zone=xihua_conn:10m;

server {
    listen 80;
    server_name _;

    charset utf-8;
    server_tokens off;
    client_max_body_size 10m;

    access_log /var/log/xihua-blog/access.log;
    error_log  /var/log/xihua-blog/error.log;

    # 安全头
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hexo 静态博客
    location / {
        root /var/www/xihua-blog/public;
        index index.html;
        try_files $uri $uri/ =404;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    # 登录接口：严格限流
    location /api/auth/ {
        limit_req zone=xihua_login burst=3 nodelay;
        limit_conn xihua_conn 5;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 评论提交：防灌水
    location ~ ^/api/comments(/\d+)?$ {
        limit_req zone=xihua_comment burst=5 nodelay;
        limit_conn xihua_conn 10;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Spring Boot API
    location /api/ {
        limit_req zone=xihua_api burst=10 nodelay;
        limit_conn xihua_conn 20;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Vue 管理后台 SPA（/admin 重定向到 /admin/）
    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        alias /var/www/xihua-blog/admin/dist/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }
}
