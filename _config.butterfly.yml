# Butterfly 主题配置覆盖
# 文档: https://butterfly.js.org/

# 导航菜单
menu:
  首页: /
  归档: /archives/
  分类: /categories/
  标签: /tags/
  关于: /about/
  后台: /admin/

# 社交链接
social:
  fab fa-github: https://github.com/ || Github || '#24292e'

# 代码块设置
code_blocks:
  theme: light
  macStyle: false
  copy: true
  language: true
  shrink: false

# 文章封面（全部禁用）
cover:
  index_enable: false
  aside_enable: false
  archives_enable: false
  default_cover:

# 首页顶部图（白色背景，用于显示站点标题）
index_img: '#ffffff'

# 禁用页面顶部横幅图（首页用 index_img 单独控制）
disable_top_img: false

# 文章元数据
post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: false
    label: false
  post:
    date_type: both
    categories: true
    tags: true
    label: false

# 首页文章列表显示方式
index_post_content:
  method: 3
  length: 150

# 搜索
search:
  use: local_search
  placeholder: 搜索文章...
  local_search:
    preload: true
    top_n_per_article: 1
    unescape: false
    pagination:
      enable: false

# 评论系统（自建后端）
comments:
  use: false
  text: false
  lazyload: false
  count: false

# 侧边栏（完全禁用）
aside:
  enable: false

# 页脚
footer:
  owner:
    enable: true
    since: 2026
  custom_text:
  copyright: true

# 页面默认显示模式
display_mode: light

# 主色
theme_color:
  enable: true
  main: "#146bb7"
  paginator: "#146bb7"
  button_hover: "#0d4f8c"
  link_color: "#146bb7"
  meta_color: "#999"
  hr_color: "#eee"
  blockquote_padding_color: "#146bb7"
  blockquote_background_color: "#f8f9fa"
  scrollbar_color: "#146bb7"
  meta_theme_color_light: "#ffffff"
  meta_theme_color_dark: "#0d0d0d"

# 圆角
rounded_corners_ui: false

# Header/Footer 遮罩
mask:
  header: false
  footer: false

# 文章排版
text_align_justify: true

# PJAX 无刷新页面切换
pjax:
  enable: true

# Inject 自定义 CSS
inject:
  head:
    - <link rel="stylesheet" href="/css/custom.css">
    - <link rel="stylesheet" href="/css/comment.css">
  bottom:
    - <script src="/js/comment.js"></script>
