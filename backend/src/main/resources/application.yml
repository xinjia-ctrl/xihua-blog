server:
  port: 8080

spring:
  application:
    name: xihua-blog
  profiles:
    active: dev

jwt:
  secret: xihua-blog-jwt-secret-key-at-least-256-bits-long-for-hs256-algorithm
  expiration: 86400000

blog:
  source-posts: ../source/_posts

---
# 开发环境
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://127.0.0.1:3307/xihua_blog?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: xihua_blog_2024
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    banner: false

---
# 生产环境（Docker MySQL）
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://localhost:3306/xihua_blog?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${MYSQL_PASSWORD:xihua_blog_2024}
  sql:
    init:
      mode: never

jwt:
  secret: ${JWT_SECRET:xihua-blog-jwt-secret-key-at-least-256-bits-long-for-hs256-algorithm}
  expiration: 86400000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

blog:
  source-posts: /var/www/xihua-blog/source/_posts
